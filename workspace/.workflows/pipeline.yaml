actions:
  transform:
    type: script
    script: "echo Processing {{ input.data }} && echo 'OUTPUT: {\"result\": \"processed-{{ input.data }}\"}'"
    input:
      data: { type: string, required: true }

  summarize:
    type: script
    script: "echo Summarizing {{ input.value }} && echo 'OUTPUT: {\"summary\": \"{{ input.value }} done\"}'"
    input:
      value: { type: string, required: true }

tasks:
  data-pipeline:
    mode: distributed
    folder: data
    input:
      data: { type: string, default: "test" }
    flow:
      transform:
        action: transform
        input:
          data: "{{ input.data }}"
      summarize:
        action: summarize
        depends_on: [transform]
        input:
          value: "{{ transform.output.result }}"
