# Startup script shared by both worker and runner containers.
# Runs before the main process via /etc/stroem/startup.d/00-common.sh.
# Use this for common setup (CA certs, cloud CLI config, etc.).
startupScript: ""

# Global image tag override. Defaults to Chart.appVersion if not set.
imageTag: ""

# Override chart name / fullname for resource naming
nameOverride: ""
fullnameOverride: ""

# Image pull secrets shared by all pods
imagePullSecrets: []
#  - name: ghcr-secret

server:
  image:
    repository: ghcr.io/fremvaerk/stroem-server
    tag: ""
    pullPolicy: IfNotPresent
  # Default to 2 replicas for HA. Background tasks (scheduler, event-source
  # manager, recovery sweeper) are leader-elected via Postgres advisory
  # locks; cross-replica state propagates via Postgres LISTEN/NOTIFY. See
  # docs/operations/high-availability.md for the full HA model.
  #
  # When replicas > 1 you MUST set auth.jwt_secret and auth.refresh_secret
  # explicitly (via extraSecretEnv below) so refresh tokens minted on one
  # pod validate on the other.
  replicas: 2
  # RollingUpdate that never drops below the configured replica count.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  #  runAsNonRoot: true
  #  runAsUser: 1000
  #  fsGroup: 1000
  securityContext: {}
  #  readOnlyRootFilesystem: true
  #  allowPrivilegeEscalation: false
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # By default, spread replicas across nodes/zones so one Spot eviction
  # doesn't take both pods down at once. Tune to your topology.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: server
  priorityClassName: ""
  # Long enough to drain in-flight HTTP + WebSocket connections during a
  # Spot interruption (Spot gives ~120s warning).
  terminationGracePeriodSeconds: 60
  # preStop sleep lets the load balancer's endpoint controller deregister
  # this pod before SIGTERM. 10s covers most Ingress controllers.
  lifecycle:
    preStop:
      exec:
        command: ["/bin/sh", "-c", "sleep 10"]
  initContainers: []
  extraContainers: []
  logLevel: info
  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe: {}
  #  enabled: true
  #  httpGet:
  #    path: /healthz
  #    port: http
  #  failureThreshold: 30
  #  periodSeconds: 2
  logStorage:
    persistence:
      enabled: false
      storageClass: ""
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  podDisruptionBudget:
    # Enabled by default to guarantee at least one server pod stays up during
    # voluntary disruptions (node drains, rolling updates). Disable only if
    # you run server.replicas: 1.
    enabled: true
    minAvailable: 1
    # maxUnavailable: 1
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  # Full server-config.yaml content — passed as-is to the ConfigMap.
  # Secrets (db.url, worker_token, auth secrets) should be set via extraSecretEnv
  # using STROEM__ env var overrides instead of putting them here.
  config:
    listen: "0.0.0.0:8080"
    db:
      url: "postgres://stroem:stroem@postgres:5432/stroem"
    log_storage:
      local_dir: /var/stroem/logs
      # Archive backend for long-term log storage (optional):
      # archive:
      #   type: s3        # "s3" or "local"
      #   bucket: my-logs
      #   region: us-east-1
      #   prefix: "logs/"
      #   # endpoint: http://minio:9000  # for S3-compatible storage
      #   # path: /mnt/archive           # for local archive
    workspaces: {}
    # Example:
    #   default:
    #     type: folder
    #     path: /workspace
    worker_token: "change-me-in-production"
  # Extra env vars injected as a Secret (for STROEM__ overrides of sensitive values).
  # REQUIRED when replicas > 1 and auth is enabled — all pods must load the same
  # STROEM__AUTH__JWT_SECRET and STROEM__AUTH__REFRESH_SECRET, otherwise refresh
  # tokens minted on one pod are rejected by every other pod (silent split-brain).
  # helm template / helm install will fail with a clear error if this requirement
  # is not met. See docs/operations/high-availability.md.
  extraSecretEnv: {}
  #  STROEM__DB__URL: "postgres://real-user:real-pass@rds:5432/stroem"
  #  STROEM__WORKER_TOKEN: "production-secret"
  #  STROEM__AUTH__JWT_SECRET: "jwt-secret"          # required when replicas > 1
  #  STROEM__AUTH__REFRESH_SECRET: "refresh-secret"  # required when replicas > 1
  # Extra plain env vars
  extraEnv: {}
  # Extra volumes and mounts (e.g., for SSH deploy keys)
  extraVolumes: []
  extraVolumeMounts: []
  resources: {}

worker:
  # Worker-specific startup script. Runs after the shared startupScript
  # via /etc/stroem/startup.d/10-worker.sh.
  startupScript: ""
  image:
    repository: ghcr.io/fremvaerk/stroem-worker
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  strategy: {}
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 300
  lifecycle: {}
  initContainers: []
  extraContainers: []
  logLevel: info
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}
  workspaceCache:
    persistence:
      enabled: false
      storageClass: ""
      size: 5Gi
      accessModes:
        - ReadWriteOnce
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    # maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  # Full worker-config.yaml content — passed as-is to the ConfigMap.
  # server_url and worker_name are auto-injected via env vars.
  config:
    server_url: "http://stroem-server:8080"
    worker_token: "change-me-in-production"
    worker_name: "k8s-worker"
    max_concurrent: 4
    poll_interval_secs: 2
    workspace_cache_dir: /var/stroem/workspace-cache
    # Runner types this worker supports (post-041 replacement for the
    # mixed `tags` field). Any of: script, docker, kubernetes, agent.
    capabilities:
      - script
    # Reservation labels (empty = permissive, accepts any step this
    # worker's capabilities allow). Non-empty tags mean the worker will
    # ONLY claim steps whose action `tags` include ALL of these labels
    # — the mechanism for pinning specific jobs to a specific worker.
    tags: []
  # Extra env vars injected as a Secret
  extraSecretEnv: {}
  #  STROEM__WORKER_TOKEN: "production-secret"
  # Extra plain env vars
  extraEnv: {}
  # Docker-in-Docker sidecar for DockerRunner
  dind:
    enabled: false
    image: docker:27-dind
    resources: {}
  resources: {}

runner:
  image:
    repository: ghcr.io/fremvaerk/stroem-runner
    tag: ""  # Defaults to Chart.appVersion
  # Runner-specific startup script. Runs after the shared startupScript
  # via /etc/stroem/startup.d/10-runner.sh. Applies to Docker and Kubernetes runner containers.
  startupScript: ""

# RBAC for pod creation (needed for KubeRunner)
rbac:
  create: true
  # Extra namespaces where the worker can create pods (for KubeRunner).
  # A Role + RoleBinding will be created in each listed namespace.
  # The release namespace is always included automatically.
  namespaces: []
  #  - jobs
  #  - staging-jobs

serviceAccount:
  create: true
  name: ""
  annotations: {}
  #  eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/stroem-s3

# Optional Ingress for UI and webhook triggers
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: stroem.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: stroem-tls
  #    hosts:
  #      - stroem.example.com

# Strøm exposes /metrics on the main HTTP port. Enable the ServiceMonitor
# if you run Prometheus Operator. When metrics.public is false (default),
# the ServiceMonitor uses bearerTokenSecret to authenticate scrapes with
# the same worker token configured via STROEM__WORKER_TOKEN.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}
  # Name of the secret containing the worker token. Required when
  # `metrics.public` is false (the default). Override only if you store
  # the worker token in a secret with a non-default name/key.
  bearerTokenSecret:
    name: ""    # e.g. "stroem-worker-token" — must be set when metrics.public=false
    key: "token"

metrics:
  # If true, /metrics requires no authentication. Default false (worker token).
  public: false

# Arbitrary extra manifests rendered with full Helm context.
# Useful for NetworkPolicy, CronJob, etc.
extraManifests: []
