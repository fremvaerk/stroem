name: Dependency Submission

on:
  push:
    branches: [main]

# Submitting snapshots writes to the dependency graph.
permissions:
  contents: write

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: Submit Cargo dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Syft parses Cargo.lock natively and submits via GitHub's
      # dependency submission API when dependency-snapshot is true.
      - name: Submit Cargo.lock snapshot
        uses: anchore/sbom-action@v0
        with:
          path: .
          dependency-snapshot: true

  bun:
    name: Submit bun dependencies
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # GitHub's dep graph and Syft don't yet parse bun.lock
        # (anchore/syft#4862, in progress as of 2026-05). Submit ourselves.
        workspace: [ui, docs]
    steps:
      - uses: actions/checkout@v6

      - name: Submit bun.lock snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE: ${{ matrix.workspace }}
        run: node .github/scripts/submit-bun-deps.mjs "$WORKSPACE/bun.lock"
