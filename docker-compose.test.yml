services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    ipc: host
    init: true
    working_dir: /app/ui
    volumes:
      - ./ui:/app/ui
    depends_on:
      server:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      BASE_URL: http://server:8080
      CI: "true"
    command: >
      bash -c "cd /app/ui && npm install && npx playwright install --with-deps chromium && npx playwright test"
