# Example worker configuration for Strøm
# Copy this file to worker-config.yaml and customize for your environment

# URL of the Strøm server to connect to
server_url: "http://localhost:8080"

# Authentication token for the worker (shared secret)
worker_token: "your-worker-token-here"

# Name of this worker instance (for identification)
worker_name: "worker-1"

# Maximum number of concurrent step executions
max_concurrent: 4

# How often to poll for new jobs (in seconds)
poll_interval_secs: 2

# Directory where steps will be executed
workspace_dir: "/tmp/stroem-workspace"

# Runner types this worker supports. Required.
# Any of: script, docker, kubernetes, agent. A step's derived
# `required_ability` must appear in this list for the worker to claim it.
capabilities:
  - script

# Reservation labels (taints). Empty = permissive; the worker accepts
# any step its capabilities allow. Non-empty = the worker ONLY claims
# steps whose action `tags` include ALL of these labels — the mechanism
# for pinning a specific job to this worker without letting other jobs
# leak onto it.
tags: []
